<!doctype html>
<html lang="pt-BR" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon-new.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="description" content="Task Mate - Seu gerenciador de tarefas moderno com React, Vite e Tailwind CSS" />
    <script>
      const savedTheme = localStorage.getItem('task-mate-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const initialTheme = savedTheme || (prefersDark ? 'dark' : 'light');
      document.documentElement.classList.toggle('dark', initialTheme === 'dark');
      document.body.classList.toggle('dark', initialTheme === 'dark');
    </script>
    <title>Task Mate - Gerenciador de Tarefas</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
